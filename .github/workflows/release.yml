name: Build and Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write  # Required to create releases and upload assets
    outputs:
      tag: ${{ steps.tag.outputs.TAG }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Generate release tag
        id: tag
        shell: pwsh
        run: |
          $tag = "release-$(Get-Date -Format 'yyyy.MM.dd-HHmmss')"
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT

      - name: Build Client Release
        run: |
          msbuild "StarRupture-ModLoader.sln" `
            /p:Configuration="Client Release" `
            /p:Platform=x64 `
            /p:PostBuildEventUseInBuild=false `
            /p:ModLoaderBuildTag="${{ steps.tag.outputs.TAG }}" `
            /p:AutoUpdateManifestUrl="https://github.com/${{ github.repository }}/releases/latest/download/manifest-client.json" `
            /m `
            /v:minimal

      - name: Build Server Release
        run: |
          msbuild "StarRupture-ModLoader.sln" `
            /p:Configuration="Server Release" `
            /p:Platform=x64 `
            /p:PostBuildEventUseInBuild=false `
            /p:ModLoaderBuildTag="${{ steps.tag.outputs.TAG }}" `
            /p:AutoUpdateManifestUrl="https://github.com/${{ github.repository }}/releases/latest/download/manifest-server.json" `
            /m `
            /v:minimal

      - name: Stage release layout
        shell: pwsh
        run: |
          foreach ($target in @("Client", "Server")) {
            $config  = "$target Release"
            $staging = "$env:GITHUB_WORKSPACE\staging\$target"
            $modsDir = "$staging\Plugins"

            New-Item -ItemType Directory -Force -Path $staging | Out-Null
            New-Item -ItemType Directory -Force -Path $modsDir | Out-Null

            # dwmapi.dll goes in the root
            Copy-Item "build\$config\dwmapi.dll" "$staging\dwmapi.dll"

            # Copy every .dll found in Plugins - no exp/lib files
            Get-ChildItem "build\$config\Plugins\*.dll" | ForEach-Object {
              Copy-Item $_.FullName $modsDir
              Write-Host "Staged [$target]: $($_.Name)"
            }
          }

      - name: Upload dwmapi.dll artifacts for SDK sync
        uses: actions/upload-artifact@v4
        with:
          name: modloader-dlls
          path: |
            staging/Client/dwmapi.dll
            staging/Server/dwmapi.dll
          retention-days: 1

      - name: Prepare individual plugin assets
        shell: pwsh
        run: |
          # Copy each plugin DLL as <Name>-<Variant>.dll for individual download
          foreach ($variant in @("Client", "Server")) {
            Get-ChildItem "build\$variant Release\Plugins\*.dll" | ForEach-Object {
              $dest = "$env:GITHUB_WORKSPACE\$($_.BaseName)-$variant.dll"
              Copy-Item $_.FullName $dest
              Write-Host "Prepared individual asset: $($_.BaseName)-$variant.dll"
            }
          }

      - name: Generate manifests
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.TAG }}"

          # Read PLUGIN_INTERFACE_VERSION_MAX directly from the header so this
          # value never drifts out of sync with the compiled binary.
          $header   = Get-Content "Version_Mod_Loader\plugins\plugin_interface.h" -Raw
          $match    = [regex]::Match($header, '#define\s+PLUGIN_INTERFACE_VERSION_MAX\s+(\d+)')
          if (-not $match.Success) { throw "Could not find PLUGIN_INTERFACE_VERSION_MAX in plugin_interface.h" }
          $ifaceVer = [int]$match.Groups[1].Value
          Write-Host "Interface version: $ifaceVer"

          foreach ($variant in @("Client", "Server")) {
            $plugins = @()

            Get-ChildItem "build\$variant Release\Plugins\*.dll" | ForEach-Object {
              $name = $_.BaseName
              $plugins += [ordered]@{
                name           = $name
                filename       = "$name.dll"           # local name written to Plugins\
                asset_filename = "$name-$variant.dll"  # GitHub release asset name
                version        = $tag
              }
            }

            $manifest = [ordered]@{
              build_tag         = $tag
              interface_version = $ifaceVer
              plugins           = $plugins
            }

            $outPath = "$env:GITHUB_WORKSPACE\manifest-$($variant.ToLower()).json"
            $manifest | ConvertTo-Json -Depth 3 | Out-File -FilePath $outPath -Encoding utf8NoBOM
            Write-Host "Generated: $outPath"
            Get-Content $outPath
          }

      - name: Create ZIP archives
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.TAG }}"
          foreach ($target in @("Client", "Server")) {
            $zipPath = "$env:GITHUB_WORKSPACE\StarRupture-ModLoader-$target-$tag.zip"
            Compress-Archive -Path "$env:GITHUB_WORKSPACE\staging\$target\*" -DestinationPath $zipPath
            Write-Host "Created ZIP: $zipPath"
          }

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag       = "${{ steps.tag.outputs.TAG }}"
          $clientZip = "$env:GITHUB_WORKSPACE\StarRupture-ModLoader-Client-$tag.zip"
          $serverZip = "$env:GITHUB_WORKSPACE\StarRupture-ModLoader-Server-$tag.zip"

          # Collect all assets: ZIPs + manifests + individual plugin DLLs
          $assets = @(
            $clientZip,
            $serverZip,
            "$env:GITHUB_WORKSPACE\manifest-client.json",
            "$env:GITHUB_WORKSPACE\manifest-server.json"
          )

          Get-ChildItem "$env:GITHUB_WORKSPACE\*-Client.dll",
                        "$env:GITHUB_WORKSPACE\*-Server.dll" | ForEach-Object {
            $assets += $_.FullName
          }

          gh release create $tag @assets `
            --title "StarRupture ModLoader $tag" `
            --generate-notes

  sync-plugin-sdk:
    needs: build
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout plugin SDK repo
        uses: actions/checkout@v4
        with:
          repository: AlienXAXS/StarRupture-Plugin-SDK
          token: ${{ secrets.SDK_REPO_PAT }}
          path: sdk

      - name: Download pre-built dwmapi.dll artifacts
        uses: actions/download-artifact@v4
        with:
          name: modloader-dlls
          path: modloader-dlls

      - name: Sync headers into plugin SDK repo
        shell: pwsh
        run: |
          # plugin_interface.h -> include/
          New-Item -ItemType Directory -Force "sdk\include" | Out-Null
          Copy-Item "main\Version_Mod_Loader\plugins\plugin_interface.h" "sdk\include\plugin_interface.h" -Force

          # PluginDevelopment.md
          Copy-Item "main\PluginDevelopment.md" "sdk\PluginDevelopment.md" -Force

          Write-Host "Sync complete."

      - name: Commit and push to SDK repo
        shell: pwsh
        run: |
          cd sdk
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          $diff = git diff --cached --name-only
          if (-not $diff) {
            Write-Host "No changes to commit."
            exit 0
          }
          git commit -m "Sync from modloader ${{ needs.build.outputs.tag }}"
          git push

      - name: Create SDK release with pre-built dwmapi.dll
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.SDK_REPO_PAT }}
        run: |
          $tag = "${{ needs.build.outputs.tag }}"

          # Rename the artifacts to make Client vs Server clear
          Copy-Item "modloader-dlls\Client\dwmapi.dll" "dwmapi-Client.dll"
          Copy-Item "modloader-dlls\Server\dwmapi.dll" "dwmapi-Server.dll"

          cd sdk
          gh release create $tag `
            --repo AlienXAXS/StarRupture-Plugin-SDK `
            --title "Plugin SDK $tag" `
            --notes "Auto-synced from modloader $tag.`n`nDownload ``dwmapi-Client.dll`` or ``dwmapi-Server.dll`` to test your plugin locally (rename to ``dwmapi.dll`` before deploying)." `
            "..\dwmapi-Client.dll" `
            "..\dwmapi-Server.dll"
