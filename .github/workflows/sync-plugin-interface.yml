name: Sync plugin_interface.h to Plugin SDK

on:
  push:
    branches:
      - main
    paths:
      - 'Version_Mod_Loader/plugins/plugin_interface.h'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout Plugin SDK repo
        uses: actions/checkout@v4
        with:
          repository: AlienXAXS/StarRupture-Plugin-SDK
          token: ${{ secrets.SDK_REPO_PAT }}
          path: sdk

      - name: Copy updated header
        run: |
          mkdir -p sdk/include
          cp Version_Mod_Loader/plugins/plugin_interface.h sdk/include/plugin_interface.h

      - name: Commit and push
        run: |
          cd sdk
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add include/plugin_interface.h
          git diff --cached --quiet && echo "No changes." && exit 0
          git commit -m "Update plugin_interface.h from modloader $(cd .. && git rev-parse --short HEAD)"
          git push
